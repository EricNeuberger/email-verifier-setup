name: Build Email Verifier Installers

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
      
      - name: Install dependencies
        run: npm install
      
      - name: Install electron-builder
        run: npm install --save-dev electron-builder
      
      - name: Build Windows
        run: npm run build-win
      
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: EmailVerifier-Setup.exe
          path: dist/EmailVerifier-Setup.exe

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
      
      - name: Install dependencies
        run: npm install
      
      - name: Install electron-builder
        run: npm install --save-dev electron-builder
      
      - name: Build Mac
        run: npm run build-mac
      
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: EmailVerifier.dmg
          path: dist/EmailVerifier.dmg
