name: Build Email Verifier

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
      
      - name: Install dependencies
        run: npm install
      
      - name: Create dist folder
        run: mkdir -p dist
      
      - name: Copy installer
        run: cp build.bat dist/
      
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: email-verifier-files
          path: dist/
